<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Help Tool - Url Parse Tool (Hono)</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    >
  </head>
  <body>
    <div class="container mt-4">
      <h2>Developer Help Tool - Url Parse Tool</h2>
      <div class="card mt-4">
        <div class="card-header">
          Url Parse Tool
        </div>
        <div class="card-body">
          <div class="container">
            <div class="input-group mb-3">
              <span class="input-group-text" id="parsedUrlLabel">
                Parsed URL
              </span>
              <input
                type="url"
                class="form-control"
                aria-describedby="parsedUrlLabel"
                id="parsedUrl"
              />
            </div>

            <div class="row" style="margin-top: 10px; margin-bottom: 10px">
              <div class="col text-center">
                <button
                  type="button"
                  class="btn btn-primary"
                  id="parseUrlBtn"
                >
                  ▼ Parse URL
                </button>
              </div>
              <div class="col text-center">
                <button
                  type="button"
                  class="btn btn-primary"
                  id="buildUrlBtn"
                >
                  ▲ Build URL
                </button>
              </div>
            </div>

            <div>
              <div class="input-group mb-3">
                <span class="input-group-text" id="baseUrlLabel">
                  Base URL
                </span>
                <input
                  type="url"
                  class="form-control"
                  aria-describedby="baseUrlLabel"
                  id="baseUrl"
                />
              </div>

              <table class="table table-sm">
                <thead>
                  <tr>
                    <th scope="col">URL PARAM KEY</th>
                    <th scope="col">URL PARAM VALUE</th>
                    <th scope="col">DELETE</th>
                  </tr>
                </thead>
                <tbody id="urlParamsTableBody">
                  <!-- Rows will be populated here -->
                </tbody>
              </table>

              <div style="text-align: center">
                <button
                  type="button"
                  class="btn btn-secondary"
                  id="addParamBtn"
                >
                  add param
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
