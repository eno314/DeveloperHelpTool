<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encode And Decode Tool</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    >
    <style>
      .textarea {
        height: 500px !important;
      }
      .gap-3 {
        gap: 1rem !important;
      }
    </style>
  </head>
  <body>
    <div class="container mt-5">
      <h1>Developer Help Tool - Encode And Decode Tool</h1>

      <div id="root">
        <div class="container">
          <div class="row mb-3">
            <div class="col-md-4">
              <label for="modeSelect" class="form-label">Format</label>
              <select id="modeSelect" class="form-select">
                <option value="URL">URL</option>
                <option value="Base64">Base64</option>
                <option value="JSON">JSON</option>
              </select>
            </div>
          </div>

          <div class="row align-items-center mb-3">
            <div class="col-md-5">
              <div id="leftUploadContainer" class="mb-2 d-none">
                <label for="left-upload" class="form-label d-block mb-1"
                >Upload File to Encode</label>
                <input
                  id="left-upload"
                  type="file"
                  accept=".json,.txt"
                  class="form-control form-control-sm"
                  aria-label="Upload File to Encode"
                >
              </div>
              <div class="form-floating">
                <textarea
                  id="encodingTextarea"
                  class="form-control textarea"
                  placeholder="Please input text you'd like to encode."
                ></textarea>
                <label id="encodingTextareaLabel" for="encodingTextarea"
                >Please input text you'd like to encode.</label>
              </div>
            </div>

            <div class="col-md-2 text-center d-flex flex-column gap-3">
              <button type="button" class="btn btn-primary" id="encodeBtn">
                Encoding ▶
              </button>
              <button type="button" class="btn btn-primary" id="decodeBtn">
                ◀ Decoding
              </button>
            </div>

            <div class="col-md-5">
              <div id="rightUploadContainer" class="mb-2 d-none">
                <label for="right-upload" class="form-label d-block mb-1"
                >Upload File to Decode</label>
                <input
                  id="right-upload"
                  type="file"
                  accept=".json,.txt"
                  class="form-control form-control-sm"
                  aria-label="Upload File to Decode"
                >
              </div>
              <div class="form-floating">
                <textarea
                  id="decodingTextarea"
                  class="form-control textarea"
                  placeholder="Please input text you'd like to decode."
                ></textarea>
                <label for="decodingTextarea"
                >Please input text you'd like to decode.</label>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
