<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Help Tool - Amidakuji Tool</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    >
    <style>
      .amidakujiBoard {
        margin-top: 30px;
        width: 100%;
        overflow-x: auto;
        display: flex;
        justify-content: center;
      }
      .amidakujiInner {
        position: relative;
        width: 100%;
        max-width: 1000px;
        min-width: 300px; /* Ensure labels don't overlap too much on small screens */
        padding: 0 40px; /* Protect edge labels from being clipped by translateX(-50%) */
        box-sizing: border-box;
      }
      .labelsRow {
        position: relative;
        width: 100%;
        height: 80px; /* Space for label and select button */
      }
      .labelsRow.bottomLabelsRow {
        height: 40px; /* Space for label only */
      }
      .labelContainer {
        position: absolute;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 60px;
        transform: translateX(-50%);
      }
      .labelInput {
        text-align: center;
        padding: 4px;
        font-size: 14px;
        width: 100%;
      }
      .svgWrapper {
        width: 100%;
        margin: 10px 0;
      }
      .svgContainer {
        display: block;
        width: 100%;
        height: 400px; /* Fix height to prevent infinite scaling */
        overflow: visible; /* Prevent clipping */
      }
    </style>
  </head>
  <body>
    <div class="container mt-5">
      <h1>Developer Help Tool - Amidakuji Tool</h1>
      <p class="text-secondary">
        You can play Amidakuji (Ghost Leg) by this tool.
      </p>

      <div id="root">
        <div class="container">
          <div class="mb-4">
            <label for="numLinesInput" class="form-label"
            >Number of Lines (2-15):</label>
            <input
              type="number"
              id="numLinesInput"
              class="form-control"
              value="5"
              min="2"
              max="15"
              style="max-width: 200px"
            />
            <div class="mt-3">
              <button
                type="button"
                class="btn btn-primary me-2"
                id="generateBtn"
              >
                生成 (Generate)
              </button>
              <button
                type="button"
                class="btn btn-outline-secondary"
                id="clearBtn"
              >
                クリア (Clear)
              </button>
            </div>
          </div>

          <div class="amidakujiBoard" id="boardContainer">
            <div class="amidakujiInner">
              <!-- Top Labels -->
              <div class="labelsRow" id="topLabelsContainer"></div>

              <!-- SVG -->
              <div class="svgWrapper" id="svgWrapper"></div>

              <!-- Bottom Labels -->
              <div class="labelsRow bottomLabelsRow" id="bottomLabelsContainer"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
