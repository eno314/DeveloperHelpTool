<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Help Tool - JSON Compare Tool</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    >
    <style>
      .diffContainer {
        min-height: 200px;
        white-space: pre-wrap;
        word-break: break-all;
        background-color: #f8f9fa;
        padding: 1rem;
        border: 1px solid #ced4da;
        border-radius: 0.375rem;
      }
      .added {
        background-color: #d4edda;
        color: #155724;
      }
      .removed {
        background-color: #f8d7da;
        color: #721c24;
        text-decoration: line-through;
      }
    </style>
  </head>
  <body>
    <div class="container mt-5">
      <h1>Developer Help Tool - JSON Compare Tool</h1>
      <p class="text-secondary">You can compare two JSONs by this tool.</p>

      <div id="root">
        <div class="container mt-4">
          <div id="errorAlert" class="alert alert-danger d-none" role="alert">
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <div class="mb-2">
                <label for="left-json-input" class="form-label d-block mb-1">
                  Left JSON
                </label>
                <input
                  type="file"
                  accept=".json"
                  class="form-control form-control-sm"
                  id="left-file-input"
                  aria-label="Upload Left JSON file"
                />
              </div>
              <textarea
                id="left-json-input"
                class="form-control"
                rows="10"
              ></textarea>
            </div>
            <div class="col-md-6">
              <div class="mb-2">
                <label for="right-json-input" class="form-label d-block mb-1">
                  Right JSON
                </label>
                <input
                  type="file"
                  accept=".json"
                  class="form-control form-control-sm"
                  id="right-file-input"
                  aria-label="Upload Right JSON file"
                />
              </div>
              <textarea
                id="right-json-input"
                class="form-control"
                rows="10"
              ></textarea>
            </div>
          </div>

          <div class="row mb-4">
            <div class="col text-center">
              <button type="button" class="btn btn-primary" id="compareBtn">
                Compare
              </button>
            </div>
          </div>

          <div id="diffResultContainer" class="row d-none">
            <div class="col-md-6">
              <h4>Left Result</h4>
              <pre id="leftResult" class="form-control diffContainer"></pre>
            </div>
            <div class="col-md-6">
              <h4>Right Result</h4>
              <pre id="rightResult" class="form-control diffContainer"></pre>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
