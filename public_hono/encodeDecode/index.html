<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encode And Decode Tool - Hono Proof of Concept</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    >
    <style>
      .textarea {
        height: 500px;
      }
      .gap-3 {
        gap: 1rem !important;
      }
    </style>
  </head>
  <body>
    <div class="container mt-5">
      <h1>Developer Help Tool - Encode And Decode Tool (Hono SPA)</h1>

      <div id="root">
        <div class="container">
          <div class="row mb-3">
            <div class="col-md-4">
              <label for="modeSelect" class="form-label">Format</label>
              <select id="modeSelect" class="form-select">
                <option value="URL">URL</option>
                <option value="Base64">Base64</option>
                <option value="JSON">JSON</option>
              </select>
            </div>
          </div>

          <div class="row align-items-center mb-3">
            <div class="col-md-5">
              <div id="leftUploadContainer" class="mb-2 d-none">
                <label for="left-upload" class="form-label d-block mb-1"
                >Upload File to Encode</label>
                <input
                  id="left-upload"
                  type="file"
                  accept=".json,.txt"
                  class="form-control form-control-sm"
                  aria-label="Upload File to Encode"
                >
              </div>
              <div class="form-floating">
                <textarea
                  id="encodingTextarea"
                  class="form-control textarea"
                  placeholder="Please input text you'd like to encode."
                ></textarea>
                <label id="encodingTextareaLabel" for="encodingTextarea"
                >Please input text you'd like to encode.</label>
              </div>
            </div>

            <div class="col-md-2 text-center d-flex flex-column gap-3">
              <button type="button" class="btn btn-primary" id="encodeBtn">
                Encoding ▶
              </button>
              <button type="button" class="btn btn-primary" id="decodeBtn">
                ◀ Decoding
              </button>
            </div>

            <div class="col-md-5">
              <div id="rightUploadContainer" class="mb-2 d-none">
                <label for="right-upload" class="form-label d-block mb-1"
                >Upload File to Decode</label>
                <input
                  id="right-upload"
                  type="file"
                  accept=".json,.txt"
                  class="form-control form-control-sm"
                  aria-label="Upload File to Decode"
                >
              </div>
              <div class="form-floating">
                <textarea
                  id="decodingTextarea"
                  class="form-control textarea"
                  placeholder="Please input text you'd like to decode."
                ></textarea>
                <label for="decodingTextarea"
                >Please input text you'd like to decode.</label>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      // Import logic from extracted utility logic inline for the POC

      const toEncodedText = (text, mode) => {
        if (mode === "URL") {
          return encodeURIComponent(text);
        } else if (mode === "JSON") {
          try {
            const obj = JSON.parse(text);
            return JSON.stringify(obj);
          } catch (err) {
            const errMessage = err.toString();
            return `can not encode. ${errMessage}.`;
          }
        } else {
          try {
            const bytes = new TextEncoder().encode(text);
            const binString = Array.from(
              bytes,
              (byte) => String.fromCodePoint(byte),
            ).join("");
            return btoa(binString);
          } catch (err) {
            const errMessage = err.toString();
            return `can not encode. ${errMessage}.`;
          }
        }
      };

      const toDecodedText = (text, mode) => {
        if (mode === "URL") {
          try {
            return decodeURIComponent(text);
          } catch (err) {
            const errMessage = err.toString();
            return `can not decode. ${errMessage}.`;
          }
        } else if (mode === "JSON") {
          try {
            const obj = JSON.parse(text);
            return JSON.stringify(obj, null, 2);
          } catch (err) {
            const errMessage = err.toString();
            return `can not decode. ${errMessage}.`;
          }
        } else {
          try {
            const binString = atob(text);
            const bytes = Uint8Array.from(
              binString,
              (m) => m.codePointAt(0),
            );
            return new TextDecoder().decode(bytes);
          } catch (err) {
            const errMessage = err.toString();
            return `can not decode. ${errMessage}.`;
          }
        }
      };

      const modeSelect = document.getElementById("modeSelect");
      const encodingTextarea = document.getElementById(
        "encodingTextarea",
      );
      const decodingTextarea = document.getElementById(
        "decodingTextarea",
      );
      const encodingTextareaLabel = document.getElementById(
        "encodingTextareaLabel",
      );
      const leftUploadContainer = document.getElementById(
        "leftUploadContainer",
      );
      const rightUploadContainer = document.getElementById(
        "rightUploadContainer",
      );

      modeSelect.addEventListener("change", (e) => {
        const mode = e.target.value;
        encodingTextarea.value = "";
        decodingTextarea.value = "";

        if (mode === "JSON") {
          leftUploadContainer.classList.remove("d-none");
          rightUploadContainer.classList.remove("d-none");
        } else {
          leftUploadContainer.classList.add("d-none");
          rightUploadContainer.classList.add("d-none");
        }

        if (mode === "Base64") {
          encodingTextareaLabel.textContent =
            "Please input text you'd like to encode. (UTF-8)";
          encodingTextarea.placeholder = "UTF-8";
        } else {
          encodingTextareaLabel.textContent =
            "Please input text you'd like to encode.";
          encodingTextarea.placeholder = "";
        }
      });

      document.getElementById("encodeBtn").addEventListener(
        "click",
        () => {
          const mode = modeSelect.value;
          const text = encodingTextarea.value;
          decodingTextarea.value = toEncodedText(text, mode);
        },
      );

      document.getElementById("decodeBtn").addEventListener(
        "click",
        () => {
          const mode = modeSelect.value;
          const text = decodingTextarea.value;
          encodingTextarea.value = toDecodedText(text, mode);
        },
      );

      const handleFileChange = (targetElementId) => (e) => {
        const file = e.target.files?.[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          const content = event.target?.result;
          if (typeof content === "string") {
            document.getElementById(targetElementId).value = content;
          }
        };
        reader.readAsText(file);
        e.target.value = "";
      };

      document.getElementById("left-upload").addEventListener(
        "change",
        handleFileChange("encodingTextarea"),
      );
      document.getElementById("right-upload").addEventListener(
        "change",
        handleFileChange("decodingTextarea"),
      );
    </script>
  </body>
</html>
