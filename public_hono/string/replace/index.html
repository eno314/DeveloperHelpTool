<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Replace Tool - Hono Proof of Concept</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        .textarea {
            height: 200px;
            margin-top: 5px;
            margin-bottom: 5px;
        }
        .buttonsRow {
            margin-top: 5px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1>Developer Help Tool - String Replace Tool (Hono SPA)</h1>

        <div id="root">
            <div class="container">
              <div class="row form-floating">
                <textarea
                  class="form-control textarea"
                  id="replacedTextarea"
                ></textarea>
                <label for="replacedTextarea">
                  Please input text you'd like to replace.
                </label>
              </div>
              <div class="row buttonsRow">
                <div class="input-group mb-3 col">
                  <span class="input-group-text" id="targetSubstrSpan">
                    target substr
                  </span>
                  <input
                    aria-describedby="targetSubstrSpan"
                    class="form-control"
                    id="targetSubstr"
                    placeholder="Supports regular expression"
                    type="text"
                  />
                </div>
                <div class="input-group mb-3 col">
                  <span class="input-group-text" id="newSubstrSpan">
                    new substr
                  </span>
                  <input
                    aria-describedby="newSubstrSpan"
                    class="form-control"
                    id="newSubstr"
                    type="text"
                  />
                </div>
              </div>
              <div class="row buttonsRow">
                <div class="col text-center">
                  <button
                    type="button"
                    class="btn btn-primary"
                    id="applyBtn"
                  >
                    ▼ Apply
                  </button>
                </div>
              </div>
              <div class="row form-floating">
                <textarea
                  class="form-control textarea"
                  id="newTextarea"
                  readonly
                ></textarea>
                <label for="newTextarea">
                  If you click apply button, replaced string will appear here.
                </label>
              </div>
            </div>
        </div>
    </div>

    <script type="module">
        // Import pure function from our source via a temporary build process for POC
        // Since it's a browser, we will inline the replaceStr function logic here for the pure HTML/JS POC,
        // or we could use Vite. For step 2 proof-of-concept, inlining the function is simplest.

        const replaceStr = (replacedStr, targetSubstr, newSubstr) => {
            if (!targetSubstr) {
                return replacedStr;
            }
            try {
                const regex = new RegExp(targetSubstr, "g");
                return replacedStr.replace(regex, newSubstr);
            } catch {
                const regex = new RegExp(targetSubstr.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "g");
                return replacedStr.replace(regex, newSubstr);
            }
        };

        document.getElementById('applyBtn').addEventListener('click', () => {
            const replacedStr = document.getElementById('replacedTextarea').value;
            const targetSubstr = document.getElementById('targetSubstr').value;
            const newSubstr = document.getElementById('newSubstr').value;

            const result = replaceStr(replacedStr, targetSubstr, newSubstr);
            document.getElementById('newTextarea').value = result;
        });
    </script>
</body>
</html>
