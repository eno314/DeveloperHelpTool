<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Help Tool - Curl Builder Tool</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    >
  </head>
  <body>
    <div class="container mt-5">
      <h1>Developer Help Tool - Curl Builder Tool</h1>
      <p class="text-secondary">You can build curl command by this tool.</p>

      <div id="root">
        <div class="container mt-4">
          <div class="row mb-3">
            <div class="col-md-2">
              <label for="methodSelect" class="form-label">Method</label>
              <select id="methodSelect" class="form-select">
                <option value="GET">GET</option>
                <option value="POST">POST</option>
                <option value="PUT">PUT</option>
                <option value="DELETE">DELETE</option>
                <option value="PATCH">PATCH</option>
              </select>
            </div>
            <div class="col-md-10">
              <label for="urlInput" class="form-label">URL</label>
              <input
                id="urlInput"
                type="text"
                class="form-control"
                placeholder="https://example.com/api?query=1"
              />
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-12">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <label class="form-label mb-0">Headers</label>
                <button
                  type="button"
                  class="btn btn-sm btn-outline-secondary"
                  id="addHeaderBtn"
                >
                  + Add Header
                </button>
              </div>
              <div id="headersContainer"></div>
              <div id="noHeadersMsg" class="text-muted small mb-2">No headers added.</div>
            </div>
          </div>

          <div id="bodySection" class="row mb-3 form-floating d-none">
            <textarea
              id="bodyTextarea"
              class="form-control"
              style="height: 150px"
              placeholder="Request Body"
            ></textarea>
            <label for="bodyTextarea" style="left: 12px">Body</label>
          </div>

          <div class="row mb-3 mt-4">
            <div class="col-12">
              <label class="form-label fw-bold">Generated curl Command</label>
              <div class="position-relative">
                <textarea
                  id="curlOutput"
                  class="form-control bg-light"
                  style="height: 120px; font-family: monospace;"
                  readonly
                ></textarea>
                <button
                  type="button"
                  id="copyBtn"
                  class="btn btn-sm btn-primary position-absolute top-0 end-0 m-2"
                >
                  Copy
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      const methodSelect = document.getElementById("methodSelect");
      const urlInput = document.getElementById("urlInput");
      const headersContainer = document.getElementById("headersContainer");
      const addHeaderBtn = document.getElementById("addHeaderBtn");
      const noHeadersMsg = document.getElementById("noHeadersMsg");
      const bodySection = document.getElementById("bodySection");
      const bodyTextarea = document.getElementById("bodyTextarea");
      const curlOutput = document.getElementById("curlOutput");
      const copyBtn = document.getElementById("copyBtn");

      let state = {
        method: "GET",
        url: "",
        headers: [], // { key, value }
        body: ""
      };

      function renderHeaders() {
        headersContainer.innerHTML = '';
        if (state.headers.length === 0) {
          noHeadersMsg.classList.remove('d-none');
        } else {
          noHeadersMsg.classList.add('d-none');
          state.headers.forEach((header, index) => {
            const row = document.createElement('div');
            row.className = 'row mb-2';
            row.innerHTML = `
              <div class="col-md-5">
                <input
                  type="text"
                  class="form-control header-key"
                  placeholder="Key (e.g., Content-Type)"
                  value="${header.key}"
                  data-index="${index}"
                />
              </div>
              <div class="col-md-6">
                <input
                  type="text"
                  class="form-control header-val"
                  placeholder="Value (e.g., application/json)"
                  value="${header.value}"
                  data-index="${index}"
                />
              </div>
              <div class="col-md-1 d-flex align-items-center">
                <button
                  type="button"
                  class="btn btn-sm btn-danger w-100 remove-header-btn"
                  data-index="${index}"
                  aria-label="Remove header"
                >
                  X
                </button>
              </div>
            `;
            headersContainer.appendChild(row);
          });
        }
        updateCurlCommand();
      }

      function updateCurlCommand() {
        let cmd = "curl";

        if (state.method !== "GET") {
          cmd += ` -X ${state.method}`;
        }

        if (state.url) {
          cmd += ` "${state.url}"`;
        } else {
          cmd += ' ""';
        }

        for (const h of state.headers) {
          if (h.key || h.value) {
            cmd += ` -H "${h.key}: ${h.value}"`;
          }
        }

        if (["POST", "PUT", "PATCH"].includes(state.method) && state.body) {
          const escapedBody = state.body.replace(/'/g, "'\\''");
          cmd += ` -d '${escapedBody}'`;
        }

        curlOutput.value = cmd;
      }

      // Event Listeners
      methodSelect.addEventListener('change', (e) => {
        state.method = e.target.value;
        if (["POST", "PUT", "PATCH"].includes(state.method)) {
          bodySection.classList.remove('d-none');
        } else {
          bodySection.classList.add('d-none');
        }
        updateCurlCommand();
      });

      urlInput.addEventListener('input', (e) => {
        state.url = e.target.value;
        updateCurlCommand();
      });

      bodyTextarea.addEventListener('input', (e) => {
        state.body = e.target.value;
        updateCurlCommand();
      });

      addHeaderBtn.addEventListener('click', () => {
        state.headers.push({ key: "", value: "" });
        renderHeaders();
      });

      headersContainer.addEventListener('input', (e) => {
        if (e.target.classList.contains('header-key')) {
          const idx = parseInt(e.target.dataset.index, 10);
          state.headers[idx].key = e.target.value;
          updateCurlCommand();
        } else if (e.target.classList.contains('header-val')) {
          const idx = parseInt(e.target.dataset.index, 10);
          state.headers[idx].value = e.target.value;
          updateCurlCommand();
        }
      });

      headersContainer.addEventListener('click', (e) => {
        if (e.target.classList.contains('remove-header-btn')) {
          const idx = parseInt(e.target.dataset.index, 10);
          state.headers.splice(idx, 1);
          renderHeaders();
        }
      });

      copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(curlOutput.value).then(() => {
          copyBtn.textContent = 'Copied!';
          copyBtn.classList.remove('btn-primary');
          copyBtn.classList.add('btn-success');
          setTimeout(() => {
            copyBtn.textContent = 'Copy';
            copyBtn.classList.remove('btn-success');
            copyBtn.classList.add('btn-primary');
          }, 2000);
        });
      });

      // Initial render
      renderHeaders();
      updateCurlCommand();
    </script>
  </body>
</html>
