<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Help Tool - Amidakuji Tool</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    >
    <style>
      .amidakujiBoard {
        margin-top: 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        overflow-x: auto;
      }
      .labelsRow {
        display: flex;
        justify-content: space-between;
        width: 100%;
        min-width: 300px;
        padding: 0 50px; /* match SVG paddingX */
      }
      .labelContainer {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 60px;
        flex-shrink: 0;
      }
      .labelInput {
        text-align: center;
        padding: 4px;
        font-size: 14px;
        width: 100%;
      }
      .svgWrapper {
        width: 100%;
        min-width: 300px;
        margin: 10px 0;
        display: flex;
        justify-content: center;
      }
      .svgContainer {
        display: block;
        max-width: 1000px;
      }
    </style>
  </head>
  <body>
    <div class="container mt-5">
      <h1>Developer Help Tool - Amidakuji Tool</h1>
      <p class="text-secondary">You can play Amidakuji (Ghost Leg) by this tool.</p>

      <div id="root">
        <div class="container">
          <div class="mb-4">
            <label for="numLinesInput" class="form-label">Number of Lines (2-15):</label>
            <input
              type="number"
              id="numLinesInput"
              class="form-control"
              value="5"
              min="2"
              max="15"
              style="max-width: 200px"
            />
            <div class="mt-3">
              <button
                type="button"
                class="btn btn-primary me-2"
                id="generateBtn"
              >
                生成 (Generate)
              </button>
              <button
                type="button"
                class="btn btn-outline-secondary"
                id="clearBtn"
              >
                クリア (Clear)
              </button>
            </div>
          </div>

          <div class="amidakujiBoard" id="boardContainer">
            <!-- Top Labels -->
            <div class="labelsRow" id="topLabelsContainer"></div>

            <!-- SVG -->
            <div class="svgWrapper" id="svgWrapper"></div>

            <!-- Bottom Labels -->
            <div class="labelsRow" id="bottomLabelsContainer"></div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      const MAX_LINES = 15;
      const MIN_LINES = 2;
      const ROWS = 20;

      const numLinesInput = document.getElementById('numLinesInput');
      const generateBtn = document.getElementById('generateBtn');
      const clearBtn = document.getElementById('clearBtn');
      const topLabelsContainer = document.getElementById('topLabelsContainer');
      const bottomLabelsContainer = document.getElementById('bottomLabelsContainer');
      const svgWrapper = document.getElementById('svgWrapper');

      let state = {
        numLines: 5,
        topLabels: Array.from({ length: 5 }, (_, i) => String(i + 1)),
        bottomLabels: Array.from({ length: 5 }, (_, i) => String(i + 1)),
        horizontalLines: [],
        isGenerated: false,
        selectedStart: null
      };

      function updateLinesCount(value) {
        let val = parseInt(value, 10);
        if (isNaN(val)) val = MIN_LINES;
        const clamped = Math.max(MIN_LINES, Math.min(val, MAX_LINES));

        if (clamped !== state.numLines) {
          state.numLines = clamped;

          // Update labels array size
          state.topLabels = Array.from({ length: clamped }, (_, i) => state.topLabels[i] || String(i + 1));
          state.bottomLabels = Array.from({ length: clamped }, (_, i) => state.bottomLabels[i] || String(i + 1));

          state.horizontalLines = [];
          state.isGenerated = false;
          state.selectedStart = null;
        }

        render();
      }

      numLinesInput.addEventListener('change', (e) => {
        updateLinesCount(e.target.value);
      });

      numLinesInput.addEventListener('blur', (e) => {
        let val = parseInt(e.target.value, 10);
        if (isNaN(val)) val = MIN_LINES;
        e.target.value = Math.max(MIN_LINES, Math.min(val, MAX_LINES));
      });

      generateBtn.addEventListener('click', () => {
        const newLines = [];
        for (let r = 0; r < ROWS; r++) {
          let c = 0;
          while (c < state.numLines - 1) {
            if (Math.random() > 0.6) {
              newLines.push({ col: c, row: r });
              c += 2;
            } else {
              c += 1;
            }
          }
        }
        state.horizontalLines = newLines;
        state.isGenerated = true;
        state.selectedStart = null;
        render();
      });

      clearBtn.addEventListener('click', () => {
        state.horizontalLines = [];
        state.isGenerated = false;
        state.selectedStart = null;
        state.topLabels = Array.from({ length: state.numLines }, (_, i) => String(i + 1));
        state.bottomLabels = Array.from({ length: state.numLines }, (_, i) => String(i + 1));
        render();
      });

      function getPath(startIndex) {
        const path = [];
        let currentCol = startIndex;

        path.push({ col: currentCol, row: -1 });

        for (let r = 0; r <= ROWS; r++) {
          const lineRight = state.horizontalLines.find(l => l.row === r && l.col === currentCol);
          const lineLeft = state.horizontalLines.find(l => l.row === r && l.col === currentCol - 1);

          if (lineRight) {
            path.push({ col: currentCol, row: r });
            currentCol += 1;
            path.push({ col: currentCol, row: r });
          } else if (lineLeft) {
            path.push({ col: currentCol, row: r });
            currentCol -= 1;
            path.push({ col: currentCol, row: r });
          }
        }

        path.push({ col: currentCol, row: ROWS });
        return path;
      }

      function render() {
        const selectedPath = state.selectedStart !== null ? getPath(state.selectedStart) : null;
        let isEndNodeArray = Array(state.numLines).fill(false);

        if (selectedPath && selectedPath.length > 0) {
          const endPoint = selectedPath[selectedPath.length - 1];
          isEndNodeArray[endPoint.col] = true;
        }

        // Top Labels
        topLabelsContainer.innerHTML = '';
        state.topLabels.forEach((label, i) => {
          const container = document.createElement('div');
          container.className = 'labelContainer';

          const input = document.createElement('input');
          input.type = 'text';
          input.className = 'form-control labelInput top-label-input';
          input.value = label;
          input.dataset.index = i;
          if (state.isGenerated) {
            input.readOnly = true;
            input.style.cursor = 'pointer';
            if (state.selectedStart === i) {
              input.style.borderColor = 'red';
              input.style.borderWidth = '2px';
            }
          }

          container.appendChild(input);

          if (state.isGenerated) {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'btn btn-sm btn-outline-danger mt-1 select-btn';
            btn.textContent = 'Select';
            btn.dataset.index = i;
            container.appendChild(btn);
          }

          topLabelsContainer.appendChild(container);
        });

        // Bottom Labels
        bottomLabelsContainer.innerHTML = '';
        state.bottomLabels.forEach((label, i) => {
          const container = document.createElement('div');
          container.className = 'labelContainer';

          const input = document.createElement('input');
          input.type = 'text';
          input.className = 'form-control labelInput bottom-label-input';
          input.value = label;
          input.dataset.index = i;
          if (state.isGenerated) {
            input.readOnly = true;
          }
          if (isEndNodeArray[i]) {
            input.style.borderColor = 'red';
            input.style.borderWidth = '2px';
            input.style.backgroundColor = '#ffe6e6';
          }

          container.appendChild(input);
          bottomLabelsContainer.appendChild(container);
        });

        // SVG
        const width = 100 * (state.numLines - 1);
        const height = 400;
        const paddingX = 50;
        const paddingY = 20;
        const rowSpacing = height / (ROWS + 1);
        const colSpacing = width / (state.numLines - 1 || 1);

        const getX = (col) => paddingX + col * colSpacing;
        const getY = (row) => paddingY + (row + 1) * rowSpacing;

        let svgHtml = `
          <svg
            width="100%"
            height="100%"
            viewBox="0 0 ${width + paddingX * 2} ${height + paddingY * 2}"
            preserveAspectRatio="none"
            class="svgContainer"
          >
        `;

        // Vertical lines
        for (let i = 0; i < state.numLines; i++) {
          svgHtml += `<line x1="${getX(i)}" y1="${paddingY}" x2="${getX(i)}" y2="${paddingY + height}" stroke="#ccc" stroke-width="4" vector-effect="non-scaling-stroke" />`;
        }

        // Horizontal lines
        if (state.isGenerated) {
          state.horizontalLines.forEach(line => {
            svgHtml += `<line x1="${getX(line.col)}" y1="${getY(line.row)}" x2="${getX(line.col + 1)}" y2="${getY(line.row)}" stroke="#ccc" stroke-width="4" vector-effect="non-scaling-stroke" />`;
          });
        }

        // Selected Path
        if (selectedPath) {
          const points = selectedPath.map(p => {
            const y = p.row === -1 ? paddingY : p.row === ROWS ? paddingY + height : getY(p.row);
            return `${getX(p.col)},${y}`;
          }).join(' ');

          svgHtml += `<polyline points="${points}" fill="none" stroke="red" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke" />`;
        }

        svgHtml += `</svg>`;
        svgWrapper.innerHTML = svgHtml;
      }

      // Event Delegation for Labels
      document.body.addEventListener('input', (e) => {
        if (e.target.classList.contains('top-label-input')) {
          const idx = parseInt(e.target.dataset.index, 10);
          state.topLabels[idx] = e.target.value;
        } else if (e.target.classList.contains('bottom-label-input')) {
          const idx = parseInt(e.target.dataset.index, 10);
          state.bottomLabels[idx] = e.target.value;
        }
      });

      document.body.addEventListener('click', (e) => {
        if (state.isGenerated && e.target.classList.contains('top-label-input')) {
          state.selectedStart = parseInt(e.target.dataset.index, 10);
          render();
        } else if (state.isGenerated && e.target.classList.contains('select-btn')) {
          state.selectedStart = parseInt(e.target.dataset.index, 10);
          render();
        }
      });

      // Initial render
      render();
    </script>
  </body>
</html>
